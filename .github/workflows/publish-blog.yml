name: Publish Blog Post

on:
  schedule:
    # Sun, Tue, Thu at 20:00 UTC (21:00 BST)
    - cron: "0 20 * * 0,2,4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Publish scheduled post
        run: node scripts/blog/publish-post.mjs

      - name: Verify build
        run: npm run build

      - name: Commit and push
        # The cron commits llms.txt + llms-full.txt rebuilds produced
        # mechanically by publish-post.mjs. The pre-commit gate at
        # scripts/checks/llms-panel-check.mjs blocks human-authored llms
        # edits; the cron is a trusted automated environment producing
        # derived content from the posts/ directory, so it bypasses the
        # gate via --no-verify. Brand-guard runs no risk on the rebuilt
        # content because publish-post.mjs only rewrites the auto-generated
        # Blog Excerpts section and the Key Pages URL list.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/blog/ scripts/blog/content-calendar.json public/llms.txt public/llms-full.txt
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit --no-verify -m "blog: publish $(date +%Y-%m-%d)

          Automated blog publish via GitHub Actions. Cron-only commit
          bypasses the human-authored llms gate via --no-verify (see
          publish-blog.yml comments). The rebuilt content is mechanically
          derived from src/data/blog/posts/ by publish-post.mjs."
          git push

      - name: Ping Google Search Console
        run: node scripts/blog/ping-search-console.mjs

      # IndexNow ping is fired inline by publish-post.mjs (no auth needed).
      # The Indexing API push (Google) needs Python + a service account JSON.
      # The publish step writes the freshly-published URL to .published-url.txt
      # so this step can pick it up. Skipped automatically if the secret is
      # not configured, so the workflow does not fail before the user has set
      # up GSC_SERVICE_ACCOUNT_STEELR_JSON.
      - name: Setup Python for Indexing API
        if: ${{ env.GSC_SERVICE_ACCOUNT_STEELR_JSON != '' }}
        env:
          GSC_SERVICE_ACCOUNT_STEELR_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_STEELR_JSON }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Push fresh URL to Google Indexing API
        if: ${{ env.GSC_SERVICE_ACCOUNT_STEELR_JSON != '' }}
        env:
          GSC_SERVICE_ACCOUNT_STEELR_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_STEELR_JSON }}
        run: |
          if [ ! -f .published-url.txt ]; then
            echo "No .published-url.txt — publish-post.mjs did not produce a URL this run. Skipping."
            exit 0
          fi
          pip install --quiet google-auth google-api-python-client
          # Decode secret to a tempfile, scoped to this step only.
          echo "$GSC_SERVICE_ACCOUNT_STEELR_JSON" > /tmp/gsc-service-account-steelr.json
          GSC_SERVICE_ACCOUNT_FILE=/tmp/gsc-service-account-steelr.json \
            python scripts/indexing/submit_url.py --from-file .published-url.txt
          # Wipe the tempfile so a later step cannot read it.
          rm -f /tmp/gsc-service-account-steelr.json

      - name: Check remaining calendar entries
        run: |
          REMAINING=$(node -e "
            const cal = JSON.parse(require('fs').readFileSync('scripts/blog/content-calendar.json','utf8'));
            const left = cal.filter(e => !e.published).length;
            console.log(left);
          ")
          echo "Remaining unpublished topics: $REMAINING"
          if [ "$REMAINING" -lt 4 ]; then
            echo "::warning::Only $REMAINING topics left in content calendar. Time to add more!"
          fi
